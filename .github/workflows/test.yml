name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathurg/cache-php-composer-pkgs@v4
        with:
          php-version: '8.2'
      - name: Install deps
        run: |
          cd backend
          composer install --no-interaction
      - name: Run PHPUnit
        run: cd backend && php artisan test

  frontend-tests:
    name: Frontend Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: cd frontend && npm ci
      - name: Run Vitest
        run: cd frontend && npx vitest run
