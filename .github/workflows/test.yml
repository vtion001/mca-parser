name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend PHPUnit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: mca_pdf_scrubber
          POSTGRES_USER: runner
          POSTGRES_PASSWORD: runner
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    container:
      image: php:8.2-cli
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          cd backend
          composer install --no-interaction
      - name: Run PHPUnit
        run: cd backend && php artisan test --env=testing
        env:
          DB_CONNECTION: pgsql
          DB_HOST: postgres
          DB_PORT: 5432
          DB_DATABASE: mca_pdf_scrubber
          DB_USERNAME: runner
          DB_PASSWORD: runner
          REDIS_HOST: redis
          REDIS_PORT: 6379

  frontend-tests:
    name: Frontend Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: cd frontend && npm ci
      - name: Run Vitest
        run: cd frontend && npx vitest run --reporter=json --output=test-results.json

  e2e-tests:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: |
          cd frontend && npm ci
          npx playwright install chromium --with-deps
      - name: Run E2E
        run: cd frontend && npx playwright test
        env:
          APP_URL: http://localhost:8000
