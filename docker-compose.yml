services:
  # Nginx reverse proxy - single entry point for all services
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "8000:80"
    depends_on:
      - frontend
      - laravel
      - docling-lb
    networks:
      - mca-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # Frontend - React app served by nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - mca-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # Laravel application
  laravel:
    build:
      context: .
      dockerfile: docker/Dockerfile.laravel
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=${SUPABASE_DB_HOST:-aws-1-ap-northeast-2.pooler.supabase.com}
      - DB_PORT=${SUPABASE_DB_PORT:-6543}
      - DB_DATABASE=postgres
      - DB_USERNAME=${SUPABASE_DB_USER:-postgres.jcstvjvfmwrtkrmdrbte}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD:?Supabase DB password required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - DOCLING_SERVICE_URL=http://docling-lb:8001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
    volumes:
      - ./backend:/var/www/html
    depends_on:
      redis:
        condition: service_healthy
      docling-lb:
        condition: service_started
    networks:
      - mca-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Laravel queue workers
  laravel-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.laravel
    command: supervisord -c /etc/supervisor/supervisord.conf
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=${SUPABASE_DB_HOST:-aws-1-ap-northeast-2.pooler.supabase.com}
      - DB_PORT=${SUPABASE_DB_PORT:-6543}
      - DB_DATABASE=postgres
      - DB_USERNAME=${SUPABASE_DB_USER:-postgres.jcstvjvfmwrtkrmdrbte}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD:?Supabase DB password required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - DOCLING_SERVICE_URL=http://docling-lb:8001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
    volumes:
      - ./backend:/var/www/html
      - ./docker/laravel/supervisord.conf:/etc/supervisor/supervisord.conf:ro
    depends_on:
      redis:
        condition: service_healthy
      docling-lb:
        condition: service_started
    networks:
      - mca-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Docling load balancer - nginx distributing to 5 docling replicas
  docling-lb:
    image: nginx:alpine
    volumes:
      - ./docker/nginx-conf/docling-lb.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mca-network
    depends_on:
      - docling-1
      - docling-2
      - docling-3
      - docling-4
      - docling-5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  # Docling replicas 1-5
  docling-1:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G

  docling-2:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G

  docling-3:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G

  docling-4:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G

  docling-5:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    networks:
      - mca-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  mca-network:
    driver: bridge

volumes:
  redis_data:
