services:
  # Nginx reverse proxy - single entry point for all services
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - laravel
      - docling
    networks:
      - mca-network
    restart: unless-stopped

  # Frontend - React app served by nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - mca-network
    restart: unless-stopped

  # Laravel application
  laravel:
    build:
      context: .
      dockerfile: docker/Dockerfile.laravel
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=mca_pdf_scrubber
      - DB_USERNAME=mca
      - DB_PASSWORD=mca_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - DOCLING_SERVICE_URL=http://docling:8001
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      docling:
        condition: service_started
    networks:
      - mca-network
    restart: unless-stopped

  # Laravel queue worker
  laravel-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.laravel
    command: php artisan queue:work --tries=1 --timeout=300 --sleep=3
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=mca_pdf_scrubber
      - DB_USERNAME=mca
      - DB_PASSWORD=mca_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - DOCLING_SERVICE_URL=http://docling:8001
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      docling:
        condition: service_started
    networks:
      - mca-network
    restart: unless-stopped

  # Python Docling service for PDF text extraction
  docling:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mca-network
    restart: unless-stopped

  # MySQL database
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root_secret
      - MYSQL_DATABASE=mca_pdf_scrubber
      - MYSQL_USER=mca
      - MYSQL_PASSWORD=mca_secret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mca-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    networks:
      - mca-network
    volumes:
      - redis_data:/data
    restart: unless-stopped

networks:
  mca-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
