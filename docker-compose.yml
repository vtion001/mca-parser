services:
  # Nginx reverse proxy - single entry point for all services
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - laravel
      - docling
    networks:
      - mca-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # Frontend - React app served by nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - mca-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # Laravel application
  laravel:
    build:
      context: .
      dockerfile: docker/Dockerfile.laravel
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-mca_pdf_scrubber}
      - DB_USERNAME=${DB_USERNAME:-mca}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - DOCLING_SERVICE_URL=http://docling:8001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      docling:
        condition: service_healthy
    networks:
      - mca-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Laravel queue worker
  laravel-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.laravel
    command: php artisan queue:work --tries=1 --timeout=300 --sleep=3
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-mca_pdf_scrubber}
      - DB_USERNAME=${DB_USERNAME:-mca}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - DOCLING_SERVICE_URL=http://docling:8001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      docling:
        condition: service_healthy
    networks:
      - mca-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Python Docling service for PDF text extraction
  docling:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  # MySQL database
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      - MYSQL_DATABASE=${DB_DATABASE:-mca_pdf_scrubber}
      - MYSQL_USER=${DB_USERNAME:-mca}
      - MYSQL_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mca-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    networks:
      - mca-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  mca-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
