services:
  laravel:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DOCLING_SERVICE_URL=http://docling:8001
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - docling
    networks:
      - mca-network

  laravel-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: php artisan queue:work --tries=1 --timeout=300 --sleep=3
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DOCLING_SERVICE_URL=http://docling:8001
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - docling
      - laravel
    networks:
      - mca-network

  docling:
    build:
      context: .
      dockerfile: python-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./python-service:/app
    networks:
      - mca-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - laravel
    networks:
      - mca-network

networks:
  mca-network:
    driver: bridge
