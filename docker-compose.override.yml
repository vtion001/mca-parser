# Development overrides — automatically applied with `docker-compose up`
# Usage: docker-compose up (no -f flag needed)
services:
  # Override frontend with live-reload dev server + bind mount
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://laravel:80
    command: npx vite --host 0.0.0.0 --port 5173

  # Override nginx to route API to Laravel dev server
  nginx:
    volumes:
      - ./docker/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro

  # Use Supabase PostgreSQL for dev
  laravel:
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=${SUPABASE_DB_HOST:-aws-1-ap-northeast-2.pooler.supabase.com}
      - DB_PORT=${SUPABASE_DB_PORT:-6543}
      - DB_DATABASE=postgres
      - DB_USERNAME=${SUPABASE_DB_USER:-postgres.jcstvjvfmwrtkrmdrbte}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD:?Supabase DB password required}
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend:/var/www/html:cached

  laravel-worker:
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=${SUPABASE_DB_HOST:-aws-1-ap-northeast-2.pooler.supabase.com}
      - DB_PORT=${SUPABASE_DB_PORT:-6543}
      - DB_DATABASE=postgres
      - DB_USERNAME=${SUPABASE_DB_USER:-postgres.jcstvjvfmwrtkrmdrbte}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD:?Supabase DB password required}
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend:/var/www/html:cached
