server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=30s;

    # Laravel API → internal nginx which handles FastCGI to php-fpm
    location /api {
        proxy_pass http://laravel:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint
    location /health {
        proxy_pass http://laravel:80;
        access_log off;
    }

    # All other routes → return a simple frontend placeholder
    location / {
        return 200 '<!DOCTYPE html><html><head><title>Dave</title></head><body><h1>Dave API Only Mode</h1><p>Frontend not running. <a href="/api/v1/health">API Health</a></p></body></html>';
        add_header Content-Type text/html;
    }
}
