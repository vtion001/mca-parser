upstream docling_cluster {
    least_conn;
    server docling-1:8001;
    server docling-2:8001;
    server docling-3:8001;
    server docling-4:8001;
    server docling-5:8001;
}

server {
    listen 8001;
    server_name _;

    location / {
        proxy_pass http://docling_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running PDF processing
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://docling_cluster;
        access_log off;
    }
}
